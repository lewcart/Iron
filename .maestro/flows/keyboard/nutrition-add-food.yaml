appId: app.rebirth
tags:
  - keyboard
---
# Regression test for capacitor.config.ts:23-32 (Keyboard.resize=body).
# When the keyboard appears in the AddFoodSheet, the search input must
# stay visible above the keyboard top — not slide off behind it.
- runFlow: ../../helpers/launch.yaml
- tapOn: "Nutrition"
- assertVisible: "Goals"
- tapOn: "Add food"
# Sheet title "Add to {slot}" is rendered through a React portal; Maestro's
# WKWebView a11y traversal sometimes misses portaled headings. Use the
# search input placeholder as the sheet-open sentinel instead — it's an
# <input> with stable accessible name.
- assertVisible: "Search foods"
- tapOn:
    text: "Search foods"
- inputText: "chicken"
- runFlow:
    file: ../../helpers/actions/assert-above-keyboard.yaml
    env:
      SELECTOR_TEXT: "Search foods"
- hideKeyboard
