appId: app.rebirth
tags:
  - nav
---
# /strategy is reached from /feed via the "Strategy" TopChip
# (src/app/feed/page.tsx:1055), now patched with id="m-feed-strategy-chip"
# for stable Maestro targeting.
#
# This flow tests just the navigation hop. The editor flow (Edit vision →
# input → assert above keyboard) requires a Vision card on the page
# (fixture pending). When that lands, restore the tapOn "Edit vision"
# + input + assert-above-keyboard chain.
- runFlow: ../../helpers/launch.yaml
- tapOn: "Week"
- assertVisible: "Strategy"
- tapOn: "Strategy"
# /strategy page heading reads "Vision and Plan" — match on Plan since
# "Vision" could be either the heading word or an (absent) card.
- assertVisible: "Plan"
