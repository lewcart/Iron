appId: app.rebirth
tags:
  - keyboard
---
# /strategy page Vision card edit: typing shouldn't push Save off-screen.
#
# Reached from /feed (Week tab) via the "Strategy" TopChip
# (src/app/feed/page.tsx:1055). The TopChip lives in a horizontal-scroll
# row of small chips at the top of /feed; Maestro's text matching can
# miss it if the chip-row hasn't fully painted, OR if the launch landed
# somewhere other than /feed.
#
# This flow currently tests just the navigation hop. The editor flow
# (Edit vision → input → assert above keyboard) requires a Vision card
# on the page (fixture pending) — when that fixture lands, restore the
# tapOn "Edit vision" + assertions.
- runFlow: ../../helpers/launch.yaml
- tapOn: "Week"
- assertVisible: "Strategy"
- tapOn: "Strategy"
# /strategy page heading reads "Vision and Plan" — match on Plan since
# Vision could refer to the heading word OR a (possibly absent) card.
- assertVisible: "Plan"
