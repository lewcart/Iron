appId: app.rebirth
---
# Swipe the sheet down to dismiss. Sheet must already be open.
#
# Maestro's `direction: DOWN` swipe starts at screen center, but our Sheet's
# drag-to-dismiss handler only fires on a swipe that starts at the drag
# handle (the small bar at the top of the sheet). Use coordinate-based
# swipe starting near the top of the sheet to get a clean dismiss.
#
# env:
#   SHEET_TITLE — aria-label of the sheet (asserted gone after swipe)
- swipe:
    start: 50%, 35%
    end: 50%, 95%
    duration: 600
- assertNotVisible:
    text: ${SHEET_TITLE}
