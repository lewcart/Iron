appId: app.rebirth
---
# Assert that an element identified by SELECTOR_TEXT is visible AND its
# bottom edge is above the keyboard top edge. Maestro's `assertVisible`
# alone returns true even if the element is technically inside the
# scroll viewport but obscured by the keyboard, so we cross-check via
# evalScript reading getBoundingClientRect against window.visualViewport.
#
# env:
#   SELECTOR_TEXT — visible text or aria-label of the element to check
- assertVisible:
    text: ${SELECTOR_TEXT}
- evalScript: |
    (() => {
      const candidates = Array.from(document.querySelectorAll('*')).filter(el => {
        const aria = el.getAttribute('aria-label') || '';
        const txt = el.textContent || '';
        return aria.includes("${SELECTOR_TEXT}") || txt.trim() === "${SELECTOR_TEXT}";
      });
      if (candidates.length === 0) {
        throw new Error("assert-above-keyboard: no element matched ${SELECTOR_TEXT}");
      }
      const target = candidates[0];
      const rect = target.getBoundingClientRect();
      const vv = window.visualViewport;
      const viewportBottom = vv ? vv.height : window.innerHeight;
      // The keyboard pushes visualViewport.height shorter than innerHeight.
      // If the element's bottom is below the viewport bottom, it's hidden.
      if (rect.bottom > viewportBottom + 1) {
        throw new Error(
          "assert-above-keyboard: '${SELECTOR_TEXT}' bottom=" + rect.bottom +
          " > viewportBottom=" + viewportBottom +
          " (keyboard is covering it)"
        );
      }
    })()
